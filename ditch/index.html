<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-itch</title>
  <!-- Favicon -->
<link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #ffffff;
      --text:    #000000;
      --muted:   #999999;
      --border:  #dddddd;
      --font:    'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    a { color: var(--text); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ════════════════════════════════════
       HEADER — full width, large
    ════════════════════════════════════ */
    .site-header {
      padding: 48px 40px 40px;
      border-bottom: 1px solid var(--text);
    }

    .site-name {
      font-size: clamp(64px, 10vw, 120px);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 0.9;
      display: block;
      margin-bottom: 16px;
    }

    .site-tagline {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ════════════════════════════════════
       BODY — sidebar left + content right
    ════════════════════════════════════ */
    .body-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      min-height: calc(100vh - 200px);
    }

    /* ── LEFT SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-section {
      margin-bottom: 28px;
    }

    .sidebar-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: block;
    }

    .sidebar-link {
      display: block;
      font-size: 13px;
      color: var(--text);
      padding: 4px 0;
      text-decoration: none;
      transition: color 0.15s;
    }

    .sidebar-link:hover {
      color: var(--muted);
      text-decoration: none;
    }

    .sidebar-link.active {
      color: var(--text);
      font-weight: 500;
    }

    /* sidebar footer — pushed to bottom */
    .sidebar-foot {
      margin-top: auto;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.8;
    }

    /* ── RIGHT CONTENT ── */
    .content {
      padding: 40px 40px 80px;
    }

    .contents-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      display: block;
    }

    /* ── ARTICLE ROWS ── */
    .article-list {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .article-card {
      position: relative;
      width: 100%;
      min-height: 280px;
      overflow: hidden;
      border: none;
      transition: opacity 0.25s;
      cursor: pointer;
    }

    .article-card:hover { opacity: 0.92; }

    /* Image fills entire row as background */
    .article-image {
      position: absolute;
      inset: 0;
    }

    .article-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      transition: transform 0.5s ease;
    }

    .article-card:hover .article-image img { transform: scale(1.02); }

    /* Text overlay — gradient from transparent to white at bottom */
    .article-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 80px 28px 24px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255,255,255,0.88) 42%,
        rgba(255,255,255,0.98) 62%
      );
    }

    .article-num {
      font-size: 9px;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    .article-title {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 4px;
      display: block;
      color: var(--text);
      text-decoration: none;
    }

    .article-title:hover { text-decoration: underline; }

    .article-author {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .article-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .article-tag {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .article-tag::before { content: '—'; margin-right: 3px; }

    /* Foot row */
    .article-foot {
      display: flex;
      align-items: center;
      gap: 16px;
      border-top: 1px solid rgba(0,0,0,0.1);
      padding-top: 12px;
      margin-top: 16px;
    }

    .read-link {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }

    .read-link:hover { color: var(--text); text-decoration: underline; }

    .read-time {
      font-size: 9px;
      color: var(--muted);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .article-card { min-height: 220px; }
    }

    @media (max-width: 700px) {
      .body-grid { grid-template-columns: 1fr; }
      .sidebar   { border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; flex-wrap: wrap; gap: 16px; padding: 20px 24px; }
      .sidebar-section { margin-bottom: 0; }
      .sidebar-foot { display: none; }
      .content   { padding: 24px; }
      .article-list { gap: 24px; }
      .article-card { min-height: 200px; }
    }
  </style>
</head>
<body>

<!-- ════ HEADER ════ -->
<header class="site-header">
  <span class="site-name">D-itch</span>
  <span class="site-tagline"> Montréal & Glasgow</span>
</header>

<!-- ════ BODY ════ -->
<div class="body-grid">

  <!-- ── LEFT SIDEBAR ── -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <span class="sidebar-label">Navigate</span>
      <a class="sidebar-link active" href="#">Journal</a>
      <a class="sidebar-link" href="#">Essays</a>
      <a class="sidebar-link" href="#">Archive</a>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-label">Listen</span>
      <a class="sidebar-link" href="#">Music</a>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-label">About</span>
      <a class="sidebar-link" href="#">About Us</a>
      <a class="sidebar-link" href="#">Submit</a>
      <a class="sidebar-link" href="#">Contact</a>
    </div>

    <div class="sidebar-foot">
      Issue I<br>
      May 2026
    </div>

  </aside>

  <!-- ── RIGHT CONTENT ── -->
  <main class="content">

    <span class="contents-label">Essays</span>

    <div class="article-list">

      <!-- ARTICLE 1 -->
      <div class="article-card">
        <div class="article-image">
          <img src="images/oo/train.png" alt="On Optimization...">
        </div>
        <div class="article-overlay">
          <span class="article-num">01</span>
          <a class="article-title" href="o_0.html">On Optimization...</a>
          <div class="article-author">Antoine Habib</div>
          <div class="article-foot">
            <a class="read-link" href="o_0.html">Read →</a>
          </div>
        </div>
      </div>

      <!-- ARTICLE 2 -->
      <div class="article-card">
        <div class="article-image">
          <img src="placeholder.png" alt="Organs of Digitized Society">
        </div>
        <div class="article-overlay">
          <span class="article-num">02</span>
          <a class="article-title" href="odc.html">Organs of Digitized Society</a>
          <div class="article-author">François Osborne</div>
          <div class="article-foot">
            <a class="read-link" href="odc.html">Read →</a>
          </div>
        </div>
      </div>

    </div>
  </main>

</div>



</body>
</html>
